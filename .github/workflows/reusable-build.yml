# Reusable workflow: build a Pocket core on GitHub Actions.
#
# Called by a user repo's workflow via:
#
#   jobs:
#     build:
#       uses: openedfpga/super-q/.github/workflows/reusable-build.yml@main
#       with:
#         core-path: .
#         seeds: "1-8"
#         parallel: 4
#
# Handles:
#   * apt runtime deps
#   * Quartus Lite 24.1 install (cached between runs)
#   * super-q install
#   * seed sweep via `superq ci build`
#   * .rbf_r artifact upload

name: super-q · build
on:
  workflow_call:
    inputs:
      core-path:
        description: Path to the Pocket core root (inside the calling repo).
        required: false
        type: string
        default: "."
      seeds:
        description: Seed range (e.g. "1-8") or single seed.
        required: false
        type: string
        default: "1-8"
      parallel:
        description: Concurrent seeds.
        required: false
        type: number
        default: 4
      mode:
        description: full | split-fit
        required: false
        type: string
        default: split-fit
      target-slack-ns:
        description: Require slack ≥ this many ns to pass.
        required: false
        type: number
        default: 0
      quartus-version:
        description: Quartus Lite version to install.
        required: false
        type: string
        default: "24.1"
      super-q-ref:
        description: Git ref (tag/sha) of super-q to install; "main" for bleeding edge.
        required: false
        type: string
        default: main
      artifact-name:
        description: GHA artifact name; defaults to <author>.<core>-<run>.
        required: false
        type: string
        default: ""
    secrets:
      QUARTUS_URL:
        description: Optional private mirror URL for the Quartus tar; avoids Intel rate limits.
        required: false
    outputs:
      passed:
        description: "true if a seed met timing"
        value: ${{ jobs.build.outputs.passed }}
      best-seed:
        description: "Winning seed number"
        value: ${{ jobs.build.outputs.best-seed }}
      rbf-path:
        description: "Repo-relative path to the winning .rbf_r"
        value: ${{ jobs.build.outputs.rbf-path }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    outputs:
      passed: ${{ steps.sweep.outputs.passed }}
      best-seed: ${{ steps.sweep.outputs.best_seed }}
      rbf-path: ${{ steps.sweep.outputs.rbf_r_path }}

    env:
      QUARTUS_ROOTDIR: /opt/intelFPGA_lite/${{ inputs.quartus-version }}/quartus

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4

      - name: Install apt runtime deps
        run: |
          set -euxo pipefail
          sudo dpkg --add-architecture i386
          sudo apt-get update
          # Deliberately minimal: Quartus's CLI tools (quartus_sh/fit/syn/sta)
          # don't need libjpeg/libpng; those are GUI-only. libjpeg62-turbo is
          # also not in Ubuntu 22.04 main/universe for amd64.
          sudo apt-get install -y --no-install-recommends \
              libc6-i386 libncurses5 libncurses6 libtinfo5 libxft2 \
              libxrender1 libxtst6 libxi6 libfreetype6 \
              rsync zip

      - name: Restore Quartus cache
        id: cache
        uses: actions/cache@v4
        with:
          path: /opt/intelFPGA_lite/${{ inputs.quartus-version }}
          key: quartus-${{ inputs.quartus-version }}-v2
          restore-keys: |
            quartus-${{ inputs.quartus-version }}-

      # Install super-q first so its bundled install-quartus.sh is available
      # without touching GitHub again. This is also what makes private-repo
      # use work — we never curl from raw.githubusercontent.com.
      - name: Install super-q
        run: |
          pip install --upgrade pip
          pip install "super-q @ git+https://github.com/openedfpga/super-q@${{ inputs.super-q-ref }}"

      - name: Download + install Quartus (on cache miss)
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          QUARTUS_URL: ${{ secrets.QUARTUS_URL }}
        run: |
          sudo mkdir -p /opt/intelFPGA_lite
          sudo chown "$USER" /opt/intelFPGA_lite
          superq install-quartus --accept-eula --version="${{ inputs.quartus-version }}"

      - name: Export Quartus env
        run: |
          echo "QUARTUS_ROOTDIR=/opt/intelFPGA_lite/${{ inputs.quartus-version }}/quartus" >> "$GITHUB_ENV"
          echo "/opt/intelFPGA_lite/${{ inputs.quartus-version }}/quartus/bin" >> "$GITHUB_PATH"

      - name: superq info
        run: superq info

      - name: Run seed sweep
        id: sweep
        # `superq ci build --min --max` handles both ranges and single
        # seeds uniformly (min==max collapses the sweep to one seed) and
        # writes GITHUB_OUTPUT for us, so no ad-hoc JSON parsing in bash.
        run: |
          SEEDS="${{ inputs.seeds }}"
          if [[ "$SEEDS" == *-* ]]; then
            MIN="${SEEDS%-*}"
            MAX="${SEEDS#*-}"
          else
            MIN="$SEEDS"
            MAX="$SEEDS"
          fi
          superq ci build "${{ inputs.core-path }}" \
            --min="$MIN" --max="$MAX" \
            --parallel="${{ inputs.parallel }}" \
            --mode="${{ inputs.mode }}" \
            --target-slack-ns="${{ inputs.target-slack-ns }}"

      - name: Build summary
        if: always() && steps.sweep.outputs.passed == 'true'
        run: |
          echo "✅ super-q: seed ${{ steps.sweep.outputs.best_seed }} passed" >> "$GITHUB_STEP_SUMMARY"
          echo "bitstream: \`${{ steps.sweep.outputs.rbf_r_path }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bitstream artifact
        if: steps.sweep.outputs.passed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name != '' && inputs.artifact-name || format('superq-{0}', github.run_id) }}
          path: |
            ${{ inputs.core-path }}/.superq/artifacts/**/seed-*/bitstream.rbf_r
            ${{ inputs.core-path }}/.superq/artifacts/**/seed-*/timing.json
            ${{ inputs.core-path }}/.superq/artifacts/**/seed-*/*.sta.rpt
          if-no-files-found: error
          retention-days: 30
