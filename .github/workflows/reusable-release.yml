# Reusable workflow: build + package + publish a Pocket core release.
#
# Triggered by the caller on tag pushes. Does everything `reusable-build`
# does, plus:
#   * packages the winning bitstream + dist/ tree into the canonical
#     `<Author>.<CoreName>_<version>.zip` layout
#   * creates (or updates) a GitHub Release at the tag
#   * attaches the zip + raw .rbf_r + timing.json as release assets

name: super-q · release
on:
  workflow_call:
    inputs:
      core-path:
        required: false
        type: string
        default: "."
      seeds:
        required: false
        type: string
        default: "1-16"
      parallel:
        required: false
        type: number
        default: 4
      mode:
        required: false
        type: string
        default: split-fit
      target-slack-ns:
        required: false
        type: number
        default: 0
      quartus-version:
        required: false
        type: string
        default: "24.1"
      super-q-ref:
        required: false
        type: string
        default: main
      draft:
        description: Create the release as a draft (for manual review before publish).
        required: false
        type: boolean
        default: false
      prerelease:
        required: false
        type: boolean
        default: false
      version:
        description: Version string to stamp into core.json and the zip filename. Defaults to the tag.
        required: false
        type: string
        default: ""
    secrets:
      QUARTUS_URL:
        required: false

jobs:
  build:
    uses: super-q/super-q/.github/workflows/reusable-build.yml@main
    with:
      core-path: ${{ inputs.core-path }}
      seeds: ${{ inputs.seeds }}
      parallel: ${{ inputs.parallel }}
      mode: ${{ inputs.mode }}
      target-slack-ns: ${{ inputs.target-slack-ns }}
      quartus-version: ${{ inputs.quartus-version }}
      super-q-ref: ${{ inputs.super-q-ref }}
    secrets:
      QUARTUS_URL: ${{ secrets.QUARTUS_URL }}

  publish:
    needs: build
    if: needs.build.outputs.passed == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write            # required to create releases
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install super-q
        run: pip install "super-q @ git+https://github.com/super-q/super-q@${{ inputs.super-q-ref }}"

      - name: Download bitstream artifact
        uses: actions/download-artifact@v4
        with:
          pattern: superq-*
          path: artifacts/
          merge-multiple: true

      - name: Locate winning bitstream
        id: bits
        run: |
          set -euxo pipefail
          RBF=$(find artifacts -name bitstream.rbf_r | head -1)
          if [ -z "$RBF" ]; then
            echo "no rbf_r in downloaded artifacts" >&2; exit 1
          fi
          echo "rbf_r=$RBF" >> "$GITHUB_OUTPUT"

      - name: Derive version
        id: ver
        run: |
          V="${{ inputs.version }}"
          if [ -z "$V" ]; then
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Package Pocket zip
        id: pack
        run: |
          superq release pack \
            --core-path="${{ inputs.core-path }}" \
            --rbf-r="${{ steps.bits.outputs.rbf_r }}" \
            --version="${{ steps.ver.outputs.version }}" \
            --out-dir=release \
            --json | tee pack.json
          ZIP=$(python -c 'import json;print(json.load(open("pack.json"))["zip_path"])')
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          cp "${{ steps.bits.outputs.rbf_r }}" release/bitstream.rbf_r

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            ${{ steps.pack.outputs.zip }}
            release/bitstream.rbf_r
            pack.json
          body: |
            Built with [super-q](https://github.com/super-q/super-q).

            * seed: `${{ needs.build.outputs.best-seed }}`
            * version: `${{ steps.ver.outputs.version }}`

            Install by extracting the zip into the root of your Pocket's SD
            card; the core appears under the Author's menu after next boot.
