# Re-usable GitHub Actions workflow.
#
# Users copy this file into their Pocket-core repo (or reference
# super-q's version via `uses:`). It supports two trigger modes:
#
#   1. `workflow_dispatch` with `archive_url` — fires from the `gha`
#      backend to run a single seed remotely.
#   2. `push` / `pull_request` — CI mode that runs a seed sweep on every
#      change using the local repo as the core source.
#
# The job caches the Quartus install + super-q pip install so reruns are
# fast. First run downloads Quartus (~8 GB), subsequent runs use the
# actions cache.

name: super-q build

on:
  workflow_dispatch:
    inputs:
      archive_url:
        description: URL to a .tar.gz of the core (used by the `gha` backend)
        required: false
      project:
        description: Quartus project name (no .qpf)
        required: false
      quartus_dir:
        description: Subdirectory containing the .qpf, relative to the core root
        required: false
        default: src/fpga
      seed:
        description: Fitter seed
        required: false
        default: "1"
      mode:
        description: "full | split-fit"
        required: false
        default: full
      job_id:
        description: super-q job id (returned in artifact name)
        required: true
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.job_id || '' }}-${{ inputs.seed || '' }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout (for CI mode)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Fetch dispatched archive
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euxo pipefail
          curl -fL "${{ inputs.archive_url }}" -o core.tar.gz
          mkdir core && tar -xzf core.tar.gz -C core --strip-components=1
          echo "CORE_PATH=core" >> "$GITHUB_ENV"

      - name: Resolve core path (CI mode)
        if: github.event_name != 'workflow_dispatch'
        run: echo "CORE_PATH=." >> "$GITHUB_ENV"

      - name: Cache Quartus
        id: cache-quartus
        uses: actions/cache@v4
        with:
          path: ~/intelFPGA_lite/24.1
          key: quartus-24.1-v1

      - name: Install Quartus
        if: steps.cache-quartus.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libc6-i386 libncurses5 libncurses6 libtinfo5 libxft2 \
              libxrender1 libxtst6 libxi6 libfreetype6 libpng16-16
          curl -fL -o q.tar \
            https://downloads.intel.com/akdlm/software/acdsinst/24.1std/917/ib_tar/Quartus-lite-24.1std.0.917-linux.tar
          mkdir -p q && tar -xf q.tar -C q
          sudo bash q/setup.sh --mode unattended --accept_eula 1 \
              --installdir "$HOME/intelFPGA_lite/24.1" \
              --disable-components quartus_help

      - name: Export Quartus env
        run: |
          echo "QUARTUS_ROOTDIR=$HOME/intelFPGA_lite/24.1/quartus" >> "$GITHUB_ENV"
          echo "$HOME/intelFPGA_lite/24.1/quartus/bin" >> "$GITHUB_PATH"

      - name: Install super-q
        run: pip install super-q

      - name: Verify
        run: superq info --json

      - name: Build (dispatch mode)
        if: github.event_name == 'workflow_dispatch'
        working-directory: ${{ env.CORE_PATH }}
        run: |
          export SUPER_Q_SEED=${{ inputs.seed }}
          super-q-worker one-shot \
            --project "${{ inputs.project }}" \
            --quartus-dir "${{ inputs.quartus_dir }}" \
            --seed ${{ inputs.seed }} \
            --output result.json

      - name: Build (CI mode)
        if: github.event_name != 'workflow_dispatch'
        run: superq ci build "$CORE_PATH"

      - name: Upload artifact (dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: superq-${{ inputs.job_id }}-seed-${{ inputs.seed }}
          path: |
            ${{ env.CORE_PATH }}/**/*.rbf
            ${{ env.CORE_PATH }}/**/*.sta.rpt
            ${{ env.CORE_PATH }}/**/timing.json
            ${{ env.CORE_PATH }}/result.json

      - name: Upload artifact (CI)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: superq-ci-${{ github.run_id }}
          path: .superq/artifacts/**/seed-*/bitstream.rbf_r
